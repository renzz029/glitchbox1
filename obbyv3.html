<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D PARKOUR PRO - Global Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; pointer-events: none; z-index: 10; }
        
        /* Menús */
        #menu, #pause-menu { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(20, 20, 30, 0.95); padding: 40px; border-radius: 15px; 
            text-align: center; color: white; border: 2px solid #00ff88; z-index: 20; min-width: 320px; 
        }
        #pause-menu { display: none; border-color: #bc13fe; } /* Color lila per diferenciar pausa */

        .btn { background: #00ff88; border: none; padding: 12px 25px; color: #000; font-weight: bold; cursor: pointer; margin: 10px; border-radius: 5px; transition: 0.3s; width: 200px; }
        .btn:hover { background: #00cc6e; transform: scale(1.05); }
        .btn-exit { background: #ff003c; color: white; }
        .btn-exit:hover { background: #cc0030; }

        input { padding: 12px; margin: 10px; border-radius: 5px; border: none; width: 220px; text-align: center; background: #1a1a1a; color: white; }
        #room-id-box { background: #111; padding: 10px; border: 1px dashed #00ff88; margin: 10px 0; cursor: pointer; color: #00ff88; font-family: monospace; }
        #lvl-counter { position: fixed; bottom: 20px; left: 20px; color: #00ff88; font-size: 22px; font-weight: bold; text-shadow: 2px 2px #000; }
        .hint-bar { position: fixed; bottom: 20px; right: 20px; color: rgba(255,255,255,0.6); font-size: 14px; text-align: right; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui"><div id="status" style="color: #00ff88; font-weight: bold;">SYSTEM ACTIVE</div></div>
    <div id="lvl-counter">Level: 0</div>
    
    <div class="hint-bar">
        [ESC] Pause Menu<br>
        [R] Respawn to Checkpoint<br>
        [0][0] Full Reset to Lobby
    </div>

    <!-- MENÚ DE PAUSA -->
    <div id="pause-menu">
        <h1 style="color: #bc13fe; margin-top: 0;">PAUSED</h1>
        <button class="btn" onclick="togglePause()">RESUME</button>
        <br>
        <button class="btn btn-exit" onclick="window.location.href='index.html'">EXIT TO HUB</button>
    </div>

    <!-- MENÚ INICIAL -->
    <div id="menu">
        <h1 style="color: #00ff88; margin-top: 0;">PARKOUR PRO</h1>
        <div id="setup-view">
            <input type="text" id="username" placeholder="Enter Nickname">
            <br>
            <button class="btn" onclick="startSystem(true)">CREATE ROOM</button>
            <button class="btn" style="background:#444; color:white" onclick="document.getElementById('join-controls').style.display='block'">JOIN FRIEND</button>
            <div id="join-controls" style="display:none; margin-top:15px; border-top: 1px solid #333; padding-top: 15px;">
                <input type="text" id="target-id" placeholder="Paste Room ID here">
                <button class="btn" onclick="startSystem(false)">CONNECT</button>
            </div>
        </div>
        <div id="lobby-view" style="display:none">
            <p>Room ID (click to copy):</p>
            <div id="room-id-box" onclick="navigator.clipboard.writeText(this.innerText); alert('ID Copied!')">Generating...</div>
            <p id="lobby-status" style="color: #888;">Waiting for players...</p>
            <button id="host-start-btn" class="btn" style="display:none; background: #00ff88;" onclick="broadcastStart()">START GAME</button>
        </div>
    </div>

<script>
let scene, camera, renderer, player, peer, conn, myId, myName, isHost;
let platforms = [], otherPlayers = {}, keys = {}, canJump = false, gameStarted = false, isPaused = false;
let pitch = 0, yaw = 0, velY = 0, currentLvl = 0;
let checkpoint = new THREE.Vector3(0, 5, 0);
let lastZeroTime = 0;

function togglePause() {
    if(!gameStarted) return;
    isPaused = !isPaused;
    const pMenu = document.getElementById('pause-menu');
    if(isPaused) {
        pMenu.style.display = 'block';
        document.exitPointerLock();
    } else {
        pMenu.style.display = 'none';
        document.body.requestPointerLock();
    }
}

function startSystem(hostMode) {
    isHost = hostMode;
    myName = document.getElementById('username').value || "Player";
    peer = new Peer();
    
    peer.on('open', id => {
        myId = id;
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('lobby-view').style.display = 'block';
        
        if (isHost) {
            document.getElementById('room-id-box').innerText = id;
            document.getElementById('host-start-btn').style.display = 'inline-block';
            setupWorld();
            peer.on('connection', c => { 
                conn = c; 
                c.on('open', () => { 
                    document.getElementById('lobby-status').innerText = "Player Connected!";
                    c.on('data', d => handleNetwork(d)); 
                }); 
            });
        } else {
            const targetId = document.getElementById('target-id').value;
            conn = peer.connect(targetId);
            conn.on('open', () => { 
                document.getElementById('lobby-status').innerText = "Joined Party Leader!";
                setupWorld(); 
                conn.on('data', d => handleNetwork(d)); 
            });
        }
    });
}

function createSkin(name, isMain) {
    const group = new THREE.Group();
    const skinMat = new THREE.MeshStandardMaterial({color: 0xffdbac});
    const clothesMat = new THREE.MeshStandardMaterial({color: isMain ? 0x00ff88 : 0x00a2ff});
    const torso = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1, 0.5), clothesMat);
    torso.position.y = 1.2; group.add(torso);
    const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), skinMat);
    head.position.y = 1.95; group.add(head);
    const eyeGeom = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const eyeMat = new THREE.MeshBasicMaterial({color: 0x000000});
    const eyeL = new THREE.Mesh(eyeGeom, eyeMat); eyeL.position.set(-0.15, 2, -0.25); group.add(eyeL);
    const eyeR = new THREE.Mesh(eyeGeom, eyeMat); eyeR.position.set(0.15, 2, -0.25); group.add(eyeR);
    const armL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), skinMat); armL.position.set(-0.6, 1.3, 0); group.add(armL);
    const armR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.8, 0.3), skinMat); armR.position.set(0.6, 1.3, 0); group.add(armR);
    const legL = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.8, 0.35), new THREE.MeshStandardMaterial({color: 0x222222})); legL.position.set(-0.25, 0.4, 0); group.add(legL);
    const legR = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.8, 0.35), new THREE.MeshStandardMaterial({color: 0x222222})); legR.position.set(0.25, 0.4, 0); group.add(legR);
    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,256,64);
    ctx.font = 'bold 30px Arial'; ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.fillText(name, 128, 45);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map: new THREE.CanvasTexture(canvas)}));
    sprite.position.y = 2.6; sprite.scale.set(2, 0.5, 1); group.add(sprite);
    return group;
}

function setupWorld() {
    if (scene) return;
    scene = new THREE.Scene(); scene.background = new THREE.Color(0x87ceeb);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1500);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const light = new THREE.DirectionalLight(0xffffff, 0.8); light.position.set(10, 50, 10); scene.add(light);

    player = createSkin(myName, true);
    scene.add(player); player.position.set(0, 5, 0);

    createPlatform(0, -1, 0, 15, 1, 15, 0x444444, 0);
    for(let i = 1; i <= 300; i++) {
        let x = Math.sin(i * 0.4) * 6;
        let z = -i * 9;
        let y = i * 1.3;
        let w = i < 15 ? 8 : (i % 10 === 0 ? 2 : 4);
        createPlatform(x, y, z, w, 0.4, 4, new THREE.Color().setHSL((i%30)/30, 0.7, 0.5), i);
    }

    const saved = localStorage.getItem('parkour_save');
    if(saved) {
        const p = platforms.find(pl => pl.userData.lvl == saved);
        if(p) { 
            player.position.set(p.position.x, p.position.y + 3, p.position.z); 
            checkpoint.copy(player.position); 
            currentLvl = parseInt(saved); 
            document.getElementById('lvl-counter').innerText = "Level: " + currentLvl; 
        }
    }

    document.addEventListener('mousemove', e => {
        if (document.pointerLockElement && !isPaused) {
            yaw -= e.movementX * 0.003;
            pitch += e.movementY * 0.003; 
            pitch = Math.max(-0.8, Math.min(0.5, pitch));
        }
    });

    window.addEventListener('keydown', e => {
        if(e.code === 'Escape') togglePause();
        if(isPaused) return;

        keys[e.code] = true;
        if(e.code === 'KeyR') { player.position.copy(checkpoint); velY = 0; }
        if(e.code === 'Digit0' || e.code === 'Numpad0') {
            let now = Date.now();
            if(now - lastZeroTime < 500) { 
                localStorage.removeItem('parkour_save');
                if(conn) conn.send({type: 'reset_lobby'});
                resetToLobby();
            }
            lastZeroTime = now;
        }
    });

    window.addEventListener('keyup', e => keys[e.code] = false);
    document.addEventListener('mousedown', () => { if(gameStarted && !isPaused) document.body.requestPointerLock(); });
    animate();
}

function resetToLobby() {
    gameStarted = false; isPaused = false;
    document.exitPointerLock();
    document.getElementById('menu').style.display = 'block';
    document.getElementById('pause-menu').style.display = 'none';
    player.position.set(0, 5, 0);
    checkpoint.set(0, 5, 0);
    currentLvl = 0; velY = 0;
    document.getElementById('lvl-counter').innerText = "Level: 0";
    if(!isHost) {
        document.getElementById('lobby-status').innerText = "Waiting for Party Leader to start...";
        document.getElementById('host-start-btn').style.display = 'none';
    } else {
        document.getElementById('lobby-status').innerText = "Back in Lobby. Ready?";
    }
}

function createPlatform(x, y, z, w, h, d, col, lvl) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({color: col}));
    m.position.set(x, y, z); m.userData = { lvl: lvl };
    scene.add(m); platforms.push(m);
}

function broadcastStart() { 
    gameStarted = true; 
    document.getElementById('menu').style.display = 'none'; 
    if(conn) conn.send({type: 'start'}); 
    document.body.requestPointerLock(); 
}

function handleNetwork(d) {
    if(d.type === 'start') { 
        gameStarted = true; 
        document.getElementById('menu').style.display = 'none'; 
        document.body.requestPointerLock(); 
    }
    if(d.type === 'reset_lobby') resetToLobby();
    if(d.type === 'move') {
        if(!otherPlayers[d.id]) { otherPlayers[d.id] = createSkin(d.name, false); scene.add(otherPlayers[d.id]); }
        otherPlayers[d.id].position.set(d.x, d.y, d.z);
        otherPlayers[d.id].rotation.y = d.ry;
    }
}

function animate() {
    requestAnimationFrame(animate);
    if (!gameStarted) { 
        if(renderer && scene && camera) renderer.render(scene, camera); 
        return; 
    }
    if (isPaused) {
        renderer.render(scene, camera);
        return;
    }

    const speed = 0.2;
    player.rotation.y = yaw;
    if (keys['KeyW']) { player.position.x -= Math.sin(yaw) * speed; player.position.z -= Math.cos(yaw) * speed; }
    if (keys['KeyS']) { player.position.x += Math.sin(yaw) * speed; player.position.z += Math.cos(yaw) * speed; }
    if (keys['KeyA']) { player.position.x -= Math.cos(yaw) * speed; player.position.z += Math.sin(yaw) * speed; }
    if (keys['KeyD']) { player.position.x += Math.cos(yaw) * speed; player.position.z -= Math.sin(yaw) * speed; }

    velY -= 0.018; player.position.y += velY;
    if (keys['Space'] && canJump) { velY = 0.38; canJump = false; }

    platforms.forEach(p => {
        let b = new THREE.Box3().setFromObject(p);
        if (b.containsPoint(new THREE.Vector3(player.position.x, player.position.y - 0.1, player.position.z))) {
            if (velY <= 0) {
                velY = 0; canJump = true; player.position.y = p.position.y + 0.4;
                if(p.userData.lvl > currentLvl) { 
                    currentLvl = p.userData.lvl; checkpoint.copy(player.position); 
                    localStorage.setItem('parkour_save', currentLvl); 
                    document.getElementById('lvl-counter').innerText = "Level: " + currentLvl; 
                }
            }
        }
    });

    if (player.position.y < -25) { player.position.copy(checkpoint); velY = 0; }

    const camDist = 8;
    camera.position.x = player.position.x + Math.sin(yaw) * camDist * Math.cos(pitch);
    camera.position.z = player.position.z + Math.cos(yaw) * camDist * Math.cos(pitch);
    camera.position.y = player.position.y + 3 + Math.sin(pitch) * camDist;
    camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);

    if (conn && conn.open) conn.send({type: 'move', id: myId, name: myName, x: player.position.x, y: player.position.y, z: player.position.z, ry: yaw});
    renderer.render(scene, camera);
}
</script>
</body>
</html>
